<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | Task Management</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Task Management</h1>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" required />
        </div>
        <div class="error" id="errorMsg"></div>
        <button type="submit" class="btn btn-primary">ログイン</button>
      </form>
      <p class="auth-link">
        アカウントがない方は <a href="register.html">新規登録</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      if (!email || !password) {
        errorMsg.textContent = 'メールアドレスとパスワードを入力してください';
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorMsg.textContent = 'メールアドレスの形式が正しくありません';
        return;
      }

      Storage.setUser({ email, displayName: email.split('@')[0] });
      window.location.href = 'boards.html';
    });
  </script>
</body>
</html>
