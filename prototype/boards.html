<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ボード一覧 | Task Management</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="boards-page">
  <header class="header header-solid">
    <h1>Task Management</h1>
    <div class="right">
      <span class="user-label" id="userLabel"></span>
      <button class="btn btn-sm" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="boards-container">
    <h2>マイボード</h2>
    <div class="boards-grid" id="boardsGrid"></div>
  </div>

  <!-- Create Board Modal -->
  <div class="modal-overlay hidden" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" style="padding: 0; border: none;">新しいボードを作成</div>
        <button class="modal-close" id="cancelCreateBtn">✕</button>
      </div>
      <div class="modal-section">
        <h3>ボード名</h3>
        <input type="text" id="newBoardName" class="form-group" style="width: 100%; padding: 0.5rem; border: 1px solid #dfe1e6; border-radius: 3px; font-size: 0.95rem;" />
      </div>
      <div class="modal-section">
        <h3>背景色</h3>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <div class="modal-footer">
        <div></div>
        <div class="actions">
          <button class="btn btn-secondary" id="cancelCreateBtn2" onclick="document.getElementById('createModal').classList.add('hidden')">キャンセル</button>
          <button class="btn btn-primary" id="createBoardBtn" style="width: auto;">作成</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/boards.js"></script>
</body>
</html>
