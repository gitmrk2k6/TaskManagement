spring:
  application:
    name: taskmanagement
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskmanagement}
    username: ${DB_USERNAME:taskmanagement}
    password: ${DB_PASSWORD:taskmanagement}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

cors:
  allowed:
    origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
